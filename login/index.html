<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – UNDERSOUTHERN</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/phvinh1968-a11y/my-images/main/logoblack.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg: #000000; 
            --card-bg: #050505;
            --text-main: #ffffff;
            --line: #1a1a1a;
            --accent: #00ff88;
        }

        body { 
            font-family: 'Fira Code', monospace; 
            background-color: var(--bg); 
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.04;
            pointer-events: none;
            z-index: 999;
        }

        .login-card {
            background-color: var(--card-bg);
            border: 1px solid var(--line);
            width: 90%;
            max-width: 320px;
            padding: 3.5rem 2.2rem;
            position: relative;
            z-index: 10;
        }
        
        .login-input { 
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--line);
            border-radius: 0;
            padding: 12px 0;
            color: white;
            transition: all 0.3s ease;
            font-size: 13px;
            width: 100%;
        }
        
        .login-input:focus { 
            border-bottom-color: var(--accent);
            outline: none;
        }

        .eye-toggle {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            color: #333;
            cursor: pointer;
            padding: 8px;
            transition: color 0.3s;
        }
        
        .eye-toggle:hover { color: var(--accent); }

        .btn-signin {
            background-color: transparent;
            color: white;
            border: 1px solid #333;
            transition: all 0.3s ease;
            margin-top: 2.5rem;
            width: 100%;
            padding: 1rem;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            cursor: pointer;
        }

        .btn-signin:hover {
            border-color: white;
            background-color: white;
            color: black;
        }

        .loader {
            border: 1px solid rgba(0, 255, 136, 0.1);
            border-top: 1px solid var(--accent);
            border-radius: 50%;
            width: 12px;
            height: 12px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .footer-fixed {
            position: fixed;
            bottom: 2rem;
            width: 100%;
            text-align: center;
            font-size: 9px;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="login-card shadow-2xl">
        <form id="loginForm" class="space-y-8">
            <div class="relative">
                <label class="block text-[8px] text-[#555] mb-1 uppercase tracking-widest">Identity</label>
                <input type="text" id="username" required class="login-input" placeholder="ID">
            </div>
            
            <div class="relative">
                <label class="block text-[8px] text-[#555] mb-1 uppercase tracking-widest">Key</label>
                <div class="relative">
                    <input type="password" id="password" required class="login-input pr-10" placeholder="••••">
                    <span class="eye-toggle" onclick="togglePassword()">
                        <i id="eye-icon" class="fa-regular fa-eye text-[11px]"></i>
                    </span>
                </div>
            </div>
            
            <button type="submit" id="login-btn" class="btn-signin">AUTHENTICATE</button>
        </form>
    </div>

    <div class="footer-fixed">© UNDERSOUTHERN. All Rights Reserverd</div>

    <script>
        // --- CẤU HÌNH SUPABASE ---
        // Thay thế bằng thông tin trong Project Settings > API của bạn
        const SUPABASE_URL = 'https://YOUR_PROJECT_URL.supabase.co';
        const SUPABASE_KEY = 'YOUR_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Hàm ẩn/hiện mật khẩu
        function togglePassword() {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Xử lý đăng nhập thực tế với Supabase
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');

            // Hiệu ứng chờ
            btn.innerHTML = '<div class="flex items-center justify-center"><div class="loader mr-2"></div> CHECKING SYSTEM...</div>';
            btn.disabled = true;

            try {
                /* GIẢ SỬ: Bạn có một bảng tên là 'users' trong Supabase 
                   với cột 'username' và 'password'.
                   Lưu ý: Trong thực tế nên dùng Supabase Auth (auth.signInWithPassword) 
                   để bảo mật hơn, nhưng đây là cách truy vấn dữ liệu bảng nếu bạn tự tạo thủ công.
                */
                const { data, error } = await supabase
                    .from('users') 
                    .select('*')
                    .eq('username', username)
                    .eq('password', password)
                    .single();

                if (error || !data) {
                    throw new Error('Access Denied: Invalid Identity or Key');
                }

                // Nếu tìm thấy dữ liệu khớp
                btn.innerHTML = 'AUTHORIZED';
                btn.style.borderColor = "#00ff88";
                btn.style.color = "#00ff88";
                
                // Lưu session tạm thời (tùy chọn)
                localStorage.setItem('us_session', JSON.stringify(data));
                
                setTimeout(() => {
                    window.location.href = "/dashboard"; 
                }, 800);

            } catch (err) {
                alert(err.message);
                btn.innerHTML = 'AUTHENTICATE';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
